name: Auto-update docs

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'DEVLOG.md'
      - 'DEVLOG.template.md'

jobs:
  update-docs:
    runs-on: ubuntu-latest
    # Skip if this commit was made by the bot (prevents infinite loop)
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk

      - name: Update README and DEVLOG with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/update-docs.js

      - name: Commit and push updated docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md DEVLOG.md
          git diff --staged --quiet || git commit -m "docs: auto-update README and DEVLOG [skip ci]"
          git push
